<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>xolar — Global IPA Library</title>

  <link rel="icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@600;700;800;900&display=swap" />

  <style>
    :root {
      --bg: #000000;
      --panel: rgba(12, 12, 12, .88);
      --panel2: rgba(18, 18, 18, .78);
      --border: rgba(98, 255, 70, .16);
      --text: #f7fff4;
      --muted: #8c968b;
      --green: #20e999;
      --green2: #62ff46;
      --pink: #ff3df2;
      --danger: #ff4057;
      --shadow: 0 22px 70px rgba(0, 0, 0, .72);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      background: #000000;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: #000000;
      font-family: Inter, Arial, sans-serif;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .site-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 18% 0%, rgba(98, 255, 70, .13), transparent 22%),
        radial-gradient(circle at 84% 7%, rgba(255, 61, 242, .08), transparent 25%),
        linear-gradient(180deg, #000000 0%, #050505 48%, #000000 100%);
    }

    .site-bg::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(135deg, rgba(255,255,255,.022) 25%, transparent 25%),
        linear-gradient(225deg, rgba(255,255,255,.016) 25%, transparent 25%);
      background-size: 42px 42px;
      opacity: .32;
      pointer-events: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: calc(92px + env(safe-area-inset-top));
      padding: calc(18px + env(safe-area-inset-top)) 24px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(0, 0, 0, .78);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .brand img {
      width: 150px;
      max-height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(98, 255, 70, .32));
    }

    .circle-brand img {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid rgba(98,255,70,.35);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(14,14,14,.92);
      border: 1px solid rgba(98,255,70,.10);
      font-size: 22px;
    }

    .drawer {
      position: fixed;
      top: calc(94px + env(safe-area-inset-top));
      right: 18px;
      z-index: 30;
      min-width: 245px;
      display: none;
      padding: 12px;
      border-radius: 22px;
      background: rgba(8, 8, 8, .98);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .drawer.open {
      display: grid;
      gap: 8px;
    }

    .drawer button {
      text-align: left;
      padding: 14px 16px;
      border-radius: 14px;
      color: var(--muted);
      font-weight: 900;
    }

    .drawer button:hover {
      background: rgba(32, 233, 153, .12);
      color: var(--text);
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    .hero,
    .list-hero,
    .el-hero {
      padding: 54px 0 34px;
    }

    .el-hero {
      text-align: center;
    }

    .breadcrumb {
      color: var(--muted);
      font-weight: 900;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .el-hero .breadcrumb {
      justify-content: center;
    }

    .breadcrumb button {
      color: var(--muted);
      font-weight: 900;
    }

    h1 {
      margin: 10px 0;
      font-size: clamp(48px, 10vw, 86px);
      line-height: .92;
      letter-spacing: -3px;
      font-weight: 900;
      text-transform: lowercase;
      font-family: Orbitron, Inter, sans-serif;
      text-shadow: 0 0 26px rgba(98,255,70,.22);
    }

    .el-hero h1 {
      text-transform: uppercase;
    }

    .hero-subtitle {
      max-width: 760px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
      font-weight: 800;
    }

    .el-hero .hero-subtitle {
      margin-left: auto;
      margin-right: auto;
    }

    .hero-card {
      margin-top: 22px;
      width: 220px;
      padding: 22px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(98,255,70,.16), rgba(0,0,0,.62));
      border: 1px solid var(--border);
    }

    .hero-card span {
      color: var(--muted);
      font-weight: 900;
    }

    .hero-card strong {
      display: block;
      font-size: 50px;
    }

    .el-promo {
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
      padding: 15px 26px;
      border-radius: 999px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffffff;
      background: #050505;
      box-shadow: 0 0 30px rgba(98,255,70,.18);
    }

    .el-promo::before {
      content: "";
      position: absolute;
      inset: -3px;
      z-index: -1;
      background: conic-gradient(from 0deg, #62ff46, #20e999, #ff3df2, #00ff88, #62ff46);
      animation: rgbSpin 2.8s linear infinite;
    }

    .el-promo::after {
      content: "";
      position: absolute;
      inset: 3px;
      z-index: -1;
      border-radius: 999px;
      background: #050505;
    }

    .el-promo span {
      position: relative;
      z-index: 1;
    }

    @keyframes rgbSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .el-nav {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      max-width: 56vw;
    }

    .el-nav button {
      flex: 0 0 auto;
      padding: 13px 16px;
      border-radius: 999px;
      background: rgba(18,18,18,.86);
      border: 1px solid rgba(98,255,70,.16);
      font-weight: 900;
    }

    .el-nav b {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      margin-left: 6px;
      border-radius: 999px;
      background: var(--green2);
      color: #000000;
      font-size: 13px;
    }

    .el-logo-orb {
      width: 154px;
      height: 154px;
      margin: 0 auto 24px;
      padding: 5px;
      border-radius: 999px;
      background: conic-gradient(from 0deg, #62ff46, #20e999, #ff3df2, #62ff46);
      animation: rgbSpin 4s linear infinite;
    }

    .el-logo-orb img {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      object-fit: cover;
      border: 6px solid #050505;
    }

    .el-links {
      display: grid;
      gap: 14px;
      margin: 28px 0;
    }

    .el-links a {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border-radius: 18px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 900;
      background: rgba(18,18,18,.82);
      border: 1px solid rgba(98,255,70,.18);
    }

    .glass-section,
    .detail-panel,
    .filter-panel {
      margin: 28px 0 42px;
      padding: 34px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .section-head {
      display: grid;
      gap: 22px;
      margin-bottom: 26px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .section-head .section-title {
      margin-bottom: 0;
    }

    .glow-icon {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--green), #5fd187);
      box-shadow: 0 0 34px rgba(32,233,153,.35);
      font-size: 28px;
    }

    .section-title h2 {
      margin: 0;
      font-size: clamp(34px, 7vw, 56px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .view-all {
      width: 100%;
      padding: 18px;
      border-radius: 17px;
      background: rgba(18,18,18,.78);
      font-weight: 900;
      font-size: 22px;
    }

    .cards-list,
    .view-list {
      display: grid;
      gap: 22px;
    }

    .ipa-card {
      position: relative;
      display: grid;
      grid-template-columns: 98px 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 22px;
      min-height: 145px;
      border-radius: 24px;
      background: var(--panel2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: .18s ease;
      box-shadow: 0 18px 60px rgba(0,0,0,.82);
    }

    .ipa-card:hover {
      transform: translateY(-2px);
      border-color: rgba(98,255,70,.6);
      background: rgba(20,20,20,.92);
    }

    .icon-wrap {
      position: relative;
      width: 92px;
      height: 92px;
    }

    .icon-wrap img {
      width: 92px;
      height: 92px;
      border-radius: 18px;
      object-fit: cover;
      background: #050505;
    }

    .mod-pill {
      position: absolute;
      left: 8px;
      bottom: -10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #ef3d42;
      color: #ffffff;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .paid-pill {
      background: linear-gradient(135deg, #ff3df2, #ff4057) !important;
    }

    .free-pill {
      background: linear-gradient(135deg, #20e999, #62ff46) !important;
      color: #001006 !important;
    }

    .platform-dot {
      position: absolute;
      right: -10px;
      top: -10px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: #050505;
      color: #ffffff;
    }

    .card-main {
      min-width: 0;
    }

    .card-main h3 {
      margin: 0 0 12px;
      font-size: clamp(24px, 5vw, 34px);
      line-height: 1.05;
      letter-spacing: -1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 20px;
      font-weight: 900;
    }

    .meta-line span:first-child {
      padding: 5px 12px;
      border-radius: 10px;
      background: rgba(98,255,70,.10);
    }

    .card-main p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 20px;
      font-weight: 800;
    }

    .status-badge {
      align-self: start;
      padding: 9px 15px;
      border-radius: 12px;
      background: linear-gradient(135deg, #18ce81, #48d18d);
      color: #ffffff;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .empty-card,
    .loading {
      min-height: 190px;
      display: grid;
      place-items: center;
      text-align: center;
      border-radius: 24px;
      background: rgba(14,14,14,.72);
      color: var(--muted);
      font-weight: 900;
      font-size: 22px;
      padding: 24px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(14,14,14,.86);
    }

    .search-box input,
    .auth-form input {
      width: 100%;
      outline: none;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 19px;
    }

    .auth-form {
      display: grid;
      gap: 14px;
      margin-top: 26px;
    }

    .auth-form input {
      padding: 20px;
      border-radius: 18px;
      border: 1px solid rgba(98,255,70,.18);
      background: rgba(14,14,14,.86);
    }

    .detail-panel {
      text-align: center;
    }

    .detail-icon img {
      width: 230px;
      height: 230px;
      border-radius: 42px;
      object-fit: cover;
      background: #050505;
      border: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0,0,0,.42);
    }

    .detail-title {
      text-transform: none;
      font-family: Inter, Arial, sans-serif;
      font-size: clamp(34px, 8vw, 56px);
      letter-spacing: -2px;
      line-height: 1.15;
    }

    .chips,
    .rating-box {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin: 22px 0;
    }

    .chips span {
      padding: 10px 18px;
      border-radius: 12px;
      background: rgba(12,12,12,.80);
      border: 1px solid var(--border);
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .rating-box {
      align-items: center;
      width: fit-content;
      margin-inline: auto;
      padding: 16px 22px;
      border-radius: 22px;
      background: rgba(12,12,12,.70);
    }

    .stars {
      display: flex;
      gap: 6px;
    }

    .star {
      width: 34px;
      height: 34px;
    }

    .download-btn,
    .demo-buy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      margin: 20px 0 12px;
      padding: 24px;
      border-radius: 20px;
      color: #ffffff;
      text-decoration: none;
      text-transform: uppercase;
      background: linear-gradient(135deg, #15df8c, #11b992);
      box-shadow: 0 0 38px rgba(32,233,153,.24);
      font-size: 22px;
      font-weight: 900;
    }

    .demo-buy-btn,
    .locked-real {
      background: rgba(18,18,18,.90);
      border: 1px solid rgba(98,255,70,.22);
      box-shadow: none;
    }

    .locked-note {
      color: var(--muted);
      font-weight: 800;
      line-height: 1.6;
    }

    .info-grid {
      display: grid;
      gap: 18px;
      margin-top: 30px;
    }

    .info-card {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 18px;
      align-items: center;
      text-align: left;
      padding: 22px;
      border-radius: 22px;
      background: rgba(14,14,14,.72);
      border: 1px solid var(--border);
    }

    .info-card > span {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(32,233,153,.14);
      color: var(--green);
      font-size: 26px;
    }

    .info-card p {
      margin: 0 0 6px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .info-card strong {
      display: block;
      word-break: break-word;
      font-size: 22px;
    }

    .collapse-box,
    .features,
    .screenshots,
    .special-panel,
    .receipt-box,
    .cart-total {
      margin-top: 22px;
      padding: 22px;
      border-radius: 22px;
      background: rgba(14,14,14,.72);
      border: 1px solid var(--border);
      text-align: left;
    }

    .collapse-box summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
    }

    .device-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .device-list span {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(98,255,70,.10);
      color: var(--muted);
      font-weight: 800;
    }

    .features h2,
    .screenshots h2 {
      margin: 0 0 14px;
      font-size: 30px;
    }

    .features p {
      color: var(--muted);
      line-height: 1.65;
      font-weight: 800;
      white-space: pre-line;
    }

    .shot-row {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .shot-row img {
      max-height: 520px;
      width: 250px;
      object-fit: cover;
      border-radius: 22px;
      border: 1px solid var(--border);
    }

    .special-panel,
    .receipt-box,
    .cart-total {
      display: flex;
      align-items: center;
      gap: 18px;
      background: linear-gradient(135deg, rgba(98,255,70,.12), rgba(255,61,242,.08));
    }

    .special-panel i {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 18px;
      background: rgba(98,255,70,.16);
      color: #62ff46;
      font-size: 25px;
    }

    .cart-total {
      justify-content: space-between;
      font-size: 24px;
      font-weight: 900;
    }

    .refund-policy {
      border-color: rgba(255,64,87,.26);
    }

    .not-found {
      min-height: 70vh;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .not-found h1 {
      color: var(--green2);
      font-size: 100px;
    }

    .spinner {
      width: 58px;
      height: 58px;
      border: 6px solid rgba(255,255,255,.12);
      border-top-color: var(--green);
      border-radius: 999px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footer {
      padding: 28px 20px 42px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #000000;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(98, 255, 70, .35);
      border-radius: 999px;
    }

    @media (max-width: 760px) {
      .el-promo,
      .el-nav {
        display: none;
      }

      .brand img {
        width: 118px;
      }

      .circle-brand img {
        width: 64px;
        height: 64px;
      }

      .page {
        padding-inline: 14px;
      }

      .glass-section,
      .detail-panel {
        padding: 24px 16px;
      }

      .ipa-card {
        grid-template-columns: 86px 1fr;
        min-height: 136px;
        padding: 18px;
      }

      .icon-wrap,
      .icon-wrap img {
        width: 78px;
        height: 78px;
      }

      .card-main h3 {
        font-size: 26px;
      }

      .meta-line,
      .card-main p {
        font-size: 18px;
      }

      .status-badge {
        position: absolute;
        top: 28px;
        right: 16px;
        font-size: 14px;
      }

      .detail-icon img {
        width: 190px;
        height: 190px;
      }

      .section-title {
        align-items: flex-start;
      }

      .glow-icon {
        width: 62px;
        height: 62px;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module">
    const CONFIG = {
      siteName: "xolar",
      logoUrl: "/favicon.svg",

      // Replace this with your normal xolar logo if needed.
      // Example:
      // logoUrl: "https://raw.githubusercontent.com/USERNAME/REPO/main/logo.png",

      elChapoLogoUrl: "https://github.com/nosleepytime/xolar/raw/refs/heads/main/IMG_4517.jpeg",

      supportEmail: "app.celeste.isp@protonmail.com",
      telegramContact: "https://t.me/ashierx7",
      telegramChannel: "https://t.me/vnxgangs"
    };

    const state = {
      posts: [],
      elChapoPosts: [],
      appleCache: new Map(),
      query: "",
      route: location.pathname,
      user: readLocal("el_chapo_user", null),
      cart: readLocal("el_chapo_cart", []),
      purchases: readLocal("el_chapo_purchases", [])
    };

    const $ = (selector, root = document) => root.querySelector(selector);

    function readLocal(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
      } catch {
        return fallback;
      }
    }

    function writeLocal(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function saveUser(user) {
      state.user = user;
      if (user) writeLocal("el_chapo_user", user);
      else localStorage.removeItem("el_chapo_user");
    }

    function saveCart() {
      writeLocal("el_chapo_cart", state.cart);
    }

    function savePurchases() {
      writeLocal("el_chapo_purchases", state.purchases);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function formatDate(value) {
      if (!value) return "Unknown";

      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "2-digit",
        year: "numeric"
      }).format(new Date(value));
    }

    function daysSince(value) {
      if (!value) return 999;
      return (Date.now() - new Date(value).getTime()) / 86400000;
    }

    function isRecentlyUpdated(post) {
      return daysSince(post.updatedAt) <= 5;
    }

    function money(post) {
      if (post.priceMode !== "paid") return "Free";
      return `${Number(post.price || 0).toFixed(2)} ${post.currency || "USD"}`;
    }

    function byUpdated(a, b) {
      return new Date(b.updatedAt) - new Date(a.updatedAt);
    }

    function byCreated(a, b) {
      return new Date(b.createdAt) - new Date(a.createdAt);
    }

    async function api(path, options) {
      const res = await fetch(path, options);
      const data = await res.json().catch(() => ({}));

      if (!res.ok || data.ok === false) {
        throw new Error(data.error || "Request failed");
      }

      return data;
    }

    async function getApple(bundleId) {
      if (!bundleId) return null;
      if (state.appleCache.has(bundleId)) return state.appleCache.get(bundleId);

      try {
        const data = await api(`/api/apple?bundleId=${encodeURIComponent(bundleId)}`);
        state.appleCache.set(bundleId, data.apple || null);
        return data.apple || null;
      } catch {
        state.appleCache.set(bundleId, null);
        return null;
      }
    }

    function starSvg(fill) {
      const pct = Math.max(0, Math.min(100, fill * 100));
      const id = `star-${Math.random().toString(36).slice(2)}`;

      return `
        <svg class="star" viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="${id}">
              <stop offset="${pct}%" stop-color="#ffc629"/>
              <stop offset="${pct}%" stop-color="#344052"/>
            </linearGradient>
          </defs>
          <path fill="url(#${id})" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
        </svg>
      `;
    }

    function stars(value) {
      const rating = Number(value || 0);
      let out = "";

      for (let i = 1; i <= 5; i++) {
        out += starSvg(Math.max(0, Math.min(1, rating - (i - 1))));
      }

      return out;
    }

          } catch (error) {
            app.innerHTML = elChapoShell(`
              <section class="not-found">
                <h1>Error</h1>
                <p>${escapeHtml(error.message)}</p>
              </section>
            `);
            bindEvents();
            return;
          }
        }

        if (state.route === "/el-chapo") {
          app.innerHTML = elChapoHomePage();
        } else if (state.route === "/el-chapo/cart") {
          app.innerHTML = cartPage();
        } else if (state.route === "/el-chapo/purchases") {
          app.innerHTML = purchasesPage();
        } else if (state.route === "/el-chapo/auth") {
          app.innerHTML = authPage();
        } else if (state.route.startsWith("/el-chapo/ipa/")) {
          app.innerHTML = await elChapoDetailPage(decodeURIComponent(state.route.split("/").pop()));
        } else {
          app.innerHTML = elChapoShell(notFoundInner());
        }

        bindEvents();
        return;
      }

      if (!state.posts.length) {
        app.innerHTML = shell(`
          <section class="loading">
            <div class="spinner"></div>
            <p>Loading Global IPA Library...</p>
          </section>
        `);

        try {
          await loadPosts();
        } catch (error) {
          app.innerHTML = shell(`
            <section class="not-found">
              <h1>Error</h1>
              <p>${escapeHtml(error.message)}</p>
            </section>
          `);
          bindEvents();
          return;
        }
      }

      if (path === "/") {
        app.innerHTML = homePage();
      } else if (["/apps", "/games", "/updates/apps", "/updates/games"].includes(path)) {
        app.innerHTML = viewAllPage();
      } else if (path === "/search") {
        app.innerHTML = searchPage();
      } else if (path.startsWith("/ipa/")) {
        app.innerHTML = await xolarDetailPage(decodeURIComponent(path.split("/").pop()));
      } else {
        app.innerHTML = notFound();
      }

      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll("[data-nav]").forEach(element => {
        element.addEventListener("click", event => {
          event.preventDefault();
          navigate(element.getAttribute("data-nav"));
        });
      });

      const drawer = $("#drawer");
      const menuBtn = $("#menuBtn");

      if (menuBtn && drawer) {
        menuBtn.addEventListener("click", () => drawer.classList.toggle("open"));
      }

      const liveSearch = $("#liveSearch");

      if (liveSearch) {
        liveSearch.addEventListener("input", event => {
          state.query = event.target.value;
          render();
        });
      }

      document.querySelectorAll("[data-add-cart]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.getAttribute("data-add-cart");

          if (!state.cart.includes(id)) {
            state.cart.push(id);
          }

          saveCart();
          render();
        });
      });

      document.querySelectorAll("[data-demo-buy]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.getAttribute("data-demo-buy");

          if (!state.user) {
            alert("Create a demo account first.");
            navigate("/el-chapo/auth");
            return;
          }

          if (!state.purchases.includes(id)) {
            state.purchases.push(id);
          }

          state.cart = state.cart.filter(item => item !== id);

          savePurchases();
          saveCart();

          alert("Demo purchase saved. Real paid download remains locked until Stripe is connected.");
          navigate("/el-chapo/purchases");
        });
      });

      const checkoutDemoBtn = $("#checkoutDemoBtn");

      if (checkoutDemoBtn) {
        checkoutDemoBtn.addEventListener("click", () => {
          if (!state.user) {
            alert("Create a demo account first.");
            navigate("/el-chapo/auth");
            return;
          }

          for (const id of state.cart) {
            if (!state.purchases.includes(id)) {
              state.purchases.push(id);
            }
          }

          state.cart = [];

          savePurchases();
          saveCart();

          alert("Demo checkout complete. Real paid downloads remain locked until Stripe is connected.");
          navigate("/el-chapo/purchases");
        });
      }

      const loginBtn = $("#loginBtn");

      if (loginBtn) {
        loginBtn.addEventListener("click", () => {
          const email = $("#emailInput")?.value.trim();
          const name = $("#nameInput")?.value.trim() || "EL CHAPO Customer";

          if (!email || !email.includes("@")) {
            alert("Enter a valid email.");
            return;
          }

          saveUser({
            email,
            name,
            createdAt: new Date().toISOString()
          });

          render();
        });
      }

      const logoutBtn = $("#logoutBtn");

      if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
          saveUser(null);
          render();
        });
      }
    }

    render();
  </script>
</body>
</html>
