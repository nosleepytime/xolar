<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ashierx7 Developer Store</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<style>
@import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@600;700;800;900&display=swap");
:root{--bg:#000;--panel:rgba(12,12,12,.9);--card:rgba(19,19,19,.82);--border:rgba(98,255,70,.18);--text:#f7fff4;--muted:#8c968b;--green:#62ff46;--green2:#20e999;--pink:#ff3df2;--red:#ff4057;--shadow:0 22px 70px rgba(0,0,0,.72)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:#000;color:var(--text);font-family:Inter,Arial,sans-serif;overflow-x:hidden}body[dir="rtl"]{text-align:right}.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(circle at 18% 0%,rgba(98,255,70,.15),transparent 22%),radial-gradient(circle at 84% 7%,rgba(255,61,242,.10),transparent 28%),linear-gradient(180deg,#000 0%,#050505 52%,#000 100%)}.bg:after{content:"";position:fixed;inset:0;background-image:linear-gradient(135deg,rgba(255,255,255,.025) 25%,transparent 25%),linear-gradient(225deg,rgba(255,255,255,.018) 25%,transparent 25%);background-size:42px 42px;opacity:.28}.topbar{position:sticky;top:0;z-index:20;height:calc(92px + env(safe-area-inset-top));padding:calc(14px + env(safe-area-inset-top)) 20px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.82);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}.brand img{width:72px;height:72px;border-radius:999px;object-fit:cover;border:1px solid rgba(98,255,70,.35);box-shadow:0 0 26px rgba(98,255,70,.22)}.nav{display:flex;gap:10px;max-width:55vw;overflow:auto}.nav button,.lang,.icon{flex:0 0 auto;padding:13px 16px;border-radius:999px;background:rgba(18,18,18,.86);border:1px solid var(--border);color:var(--text);font-weight:900}.nav b{display:inline-grid;place-items:center;min-width:22px;height:22px;margin-left:6px;border-radius:999px;background:var(--green);color:#000;font-size:13px}button{font:inherit;cursor:pointer}.page{width:min(100%,980px);margin:0 auto;padding:24px 18px 50px}.hero{text-align:center;padding:42px 0 30px}.logo-orb{width:154px;height:154px;margin:0 auto 24px;padding:5px;border-radius:999px;background:conic-gradient(from 0deg,var(--green),var(--green2),var(--pink),var(--green));animation:spin 4s linear infinite}.logo-orb img{width:100%;height:100%;border-radius:999px;object-fit:cover;border:6px solid #050505}h1{margin:10px 0;font-family:Orbitron,Inter,sans-serif;font-size:clamp(48px,10vw,86px);line-height:.92;letter-spacing:-3px;text-transform:lowercase;text-shadow:0 0 26px rgba(98,255,70,.22)}h2{margin:0;font-size:clamp(34px,7vw,54px);letter-spacing:-2px;line-height:1}.muted,.hero p{color:var(--muted);font-weight:800;line-height:1.6}.links{display:grid;gap:14px;margin:28px 0}.links a,.download,.demo{display:flex;justify-content:center;align-items:center;gap:14px;width:100%;padding:18px;border-radius:18px;color:#fff;text-decoration:none;font-weight:900;background:rgba(18,18,18,.82);border:1px solid var(--border)}.special,.section,.detail,.receipt,.total{margin:24px 0;padding:24px;border-radius:28px;background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow)}.special{display:flex;gap:18px;text-align:left;background:linear-gradient(135deg,rgba(98,255,70,.12),rgba(255,61,242,.08))}.special i{width:58px;height:58px;display:grid;place-items:center;flex:0 0 auto;border-radius:18px;background:rgba(98,255,70,.16);color:var(--green);font-size:25px}.head{display:flex;align-items:center;gap:18px;margin-bottom:22px}.glow{width:68px;height:68px;display:grid;place-items:center;flex:0 0 auto;border-radius:22px;background:linear-gradient(135deg,var(--green),var(--green2));color:#001006;font-size:28px;box-shadow:0 0 34px rgba(98,255,70,.25)}.list{display:grid;gap:18px}.card{position:relative;display:grid;grid-template-columns:90px 1fr;gap:18px;align-items:center;padding:18px;border-radius:24px;background:var(--card);border:1px solid var(--border);cursor:pointer}.card:hover{border-color:rgba(98,255,70,.6);transform:translateY(-1px)}.iconwrap{position:relative;width:82px;height:82px}.iconwrap img{width:82px;height:82px;border-radius:18px;object-fit:cover;background:#050505}.pill{position:absolute;left:6px;bottom:-10px;padding:7px 11px;border-radius:999px;font-weight:900;font-size:13px;background:linear-gradient(135deg,var(--green2),var(--green));color:#001006}.pill.paid{background:linear-gradient(135deg,var(--pink),var(--red));color:#fff}.card h3{margin:0 0 10px;font-size:clamp(24px,5vw,34px);line-height:1.05;letter-spacing:-1px}.meta{display:flex;flex-wrap:wrap;gap:10px;color:var(--muted);font-weight:900}.meta span:first-child{padding:5px 12px;border-radius:10px;background:rgba(98,255,70,.10)}.detail{text-align:center}.detailicon{width:190px;height:190px;border-radius:42px;object-fit:cover;background:#050505;border:1px solid var(--border);box-shadow:0 18px 60px rgba(0,0,0,.42)}.chips,.rating{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:20px 0}.chips span{padding:10px 16px;border-radius:12px;background:rgba(12,12,12,.8);border:1px solid var(--border);font-weight:900;text-transform:uppercase}.rating{align-items:center;width:fit-content;margin-inline:auto;padding:14px 18px;border-radius:22px;background:rgba(12,12,12,.72)}.star{width:32px;height:32px}.download{margin:22px 0;background:linear-gradient(135deg,#15df8c,#11b992);font-size:22px}.demo{margin:12px 0;background:rgba(18,18,18,.9);font-size:20px}.locked{color:var(--muted);font-weight:800;line-height:1.6}.grid{display:grid;gap:14px;margin-top:24px}.info{display:grid;grid-template-columns:58px 1fr;gap:14px;text-align:left;align-items:center;padding:16px;border-radius:20px;background:rgba(14,14,14,.72);border:1px solid var(--border)}.info span{width:52px;height:52px;display:grid;place-items:center;border-radius:16px;background:rgba(98,255,70,.14);color:var(--green)}.info p{margin:0 0 5px;color:var(--muted);font-weight:900;text-transform:uppercase}.info strong{word-break:break-word}.shots{display:flex;gap:16px;overflow:auto}.shots img{height:420px;width:220px;object-fit:cover;border-radius:22px;border:1px solid var(--border)}input{width:100%;padding:18px;border-radius:18px;border:1px solid var(--border);background:rgba(14,14,14,.86);color:var(--text);font:inherit;outline:none}.form{display:grid;gap:14px}.total{display:flex;align-items:center;justify-content:space-between}.footer{text-align:center;color:var(--muted);font-weight:800;padding:30px 18px}.footer a{color:var(--green)}.empty{padding:36px;border-radius:22px;background:rgba(14,14,14,.72);color:var(--muted);font-weight:900;text-align:center}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:760px){.nav{display:none}.page{padding-inline:14px}.special{display:block}.card{grid-template-columns:82px 1fr}.topbar{padding-inline:16px}}
</style>
</head>
<body>
<div class="bg"></div><div id="app"></div>
<script>
const LOGO='https://github.com/nosleepytime/xolar/raw/refs/heads/main/IMG_4517.jpeg';
const SUPPORT='app.celeste.isp@protonmail.com';
const CONTACT='https://t.me/ashierx7';
const CHANNEL='https://t.me/vnxgangs';
let posts=[], lang=localStorage.ax7_lang || ((navigator.language||'en').toLowerCase().startsWith('ar')?'ar':'en');
let user=JSON.parse(localStorage.ax7_user||'null');
let cart=JSON.parse(localStorage.ax7_cart||'[]');
let purchases=JSON.parse(localStorage.ax7_purchases||'[]');
const T=(en,ar)=>lang==='ar'?ar:en;
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const money=p=>p.priceMode==='paid'?`${Number(p.price||0).toFixed(2)} ${p.currency||'USD'}`:T('Free','مجاني');
const route=()=>location.hash.replace(/^#/,'')||'/';
function save(){localStorage.ax7_cart=JSON.stringify(cart);localStorage.ax7_purchases=JSON.stringify(purchases);localStorage.ax7_user=JSON.stringify(user);localStorage.ax7_lang=lang;}
async function api(path,opt){const r=await fetch(path,opt);const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error(d.error||'Request failed');return d}
async function load(){try{const d=await api('/api/ashier/posts');posts=d.posts||[]}catch(e){document.getElementById('app').innerHTML=layout(`<section class="detail"><h1>Error</h1><p class="muted">${esc(e.message)}</p></section>`);return}render()}
function layout(content){document.body.dir=lang==='ar'?'rtl':'ltr';return `<header class="topbar"><a class="brand" href="/ashierx7"><img src="${LOGO}" alt="Ashierx7"></a><nav class="nav"><button onclick="go('/')">${T('Store','المتجر')}</button><button onclick="go('/cart')">${T('Cart','السلة')} ${cart.length?`<b>${cart.length}</b>`:''}</button><button onclick="go('/purchases')">${T('My Purchases','مشترياتي')}</button><button onclick="location.href='/'">xolar</button></nav><button class="lang" onclick="setLang('${lang==='ar'?'en':'ar'}')">${lang==='ar'?'EN':'AR'}</button></header><main class="page">${content}</main><footer class="footer">${T('Support:','الدعم:')} <a href="mailto:${SUPPORT}">${SUPPORT}</a></footer>`}
function go(p){location.hash=p} function setLang(l){lang=l;save();render()}
function card(p){return `<article class="card" onclick="go('/ipa/${esc(p.id)}')"><div class="iconwrap"><img src="${esc(p.iconUrl||LOGO)}"><span class="pill ${p.priceMode==='paid'?'paid':''}">${p.priceMode==='paid'?T('PAID','مدفوع'):T('FREE','مجاني')}</span></div><div><h3>${esc(p.name)}</h3><div class="meta"><span>${esc(p.category||'IPA')}</span><span>${esc(p.size||'N/A')}</span></div><p class="muted">${esc(money(p))} · v${esc(p.ipaVersion||'N/A')}</p></div></article>`}
function home(){const paid=posts.filter(p=>p.priceMode==='paid'), free=posts.filter(p=>p.priceMode!=='paid');return layout(`<section class="hero"><div class="logo-orb"><img src="${LOGO}"></div><p class="muted">${T('Developer Store','متجر المطور')}</p><h1>Ashierx7</h1><p>${T('A separated developer page for Ashier IPA releases, paid drops, free content, announcements, and support. This page uses its own API and database path, isolated from the main xolar library.','صفحة منفصلة للمطور Ashier لملفات IPA المدفوعة والمجانية والإعلانات والدعم. هذه الصفحة تستخدم API ومسار قاعدة بيانات منفصل عن مكتبة xolar الرئيسية.')}</p><div class="links"><a href="${CONTACT}" target="_blank"><i class="fa-brands fa-telegram"></i>${T('Contact Ashier','تواصل مع Ashier')}</a><a href="${CHANNEL}" target="_blank"><i class="fa-brands fa-telegram"></i>${T('Join Telegram Channel','انضم لقناة Telegram')}</a><a href="mailto:${SUPPORT}"><i class="fa-solid fa-headset"></i>${T('Customer Support','الدعم الفني')}</a></div><div class="special"><i class="fa-solid fa-shield-halved"></i><div><strong>${T('Special Demo Store Mode','وضع المتجر التجريبي')}</strong><p>${T('Paid IPAs can be added to cart and demo-purchased without real Stripe connection. Real paid downloads stay locked until Stripe is connected later.','يمكن إضافة الملفات المدفوعة إلى السلة وتجربة الشراء بدون ربط Stripe الحقيقي. التحميلات المدفوعة تبقى مقفلة حتى يتم ربط Stripe لاحقاً.')}</p></div></div></section><section class="section"><div class="head"><span class="glow"><i class="fa-solid fa-bag-shopping"></i></span><h2>${T('Premium IPAs','ملفات مدفوعة')}</h2></div><div class="list">${paid.length?paid.map(card).join(''):`<div class="empty">${T('No paid IPA yet.','لا توجد ملفات مدفوعة حالياً.')}</div>`}</div></section><section class="section"><div class="head"><span class="glow"><i class="fa-solid fa-gift"></i></span><h2>${T('Free Content','محتوى مجاني')}</h2></div><div class="list">${free.length?free.map(card).join(''):`<div class="empty">${T('No free IPA yet.','لا توجد ملفات مجانية حالياً.')}</div>`}</div></section>`)}
function stars(v){v=Number(v||0);let out='';for(let i=1;i<=5;i++){let pct=Math.max(0,Math.min(100,(v-(i-1))*100));let id='s'+Math.random().toString(36).slice(2);out+=`<svg class="star" viewBox="0 0 24 24"><defs><linearGradient id="${id}"><stop offset="${pct}%" stop-color="#ffc629"/><stop offset="${pct}%" stop-color="#344052"/></linearGradient></defs><path fill="url(#${id})" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`}return out}
async function detail(id){const p=posts.find(x=>x.id===id);if(!p)return layout('<section class="detail"><h1>404</h1></section>');fetch('/api/ashier/views/'+encodeURIComponent(id),{method:'POST'}).catch(()=>{});let a=null;try{if(p.bundleId)a=(await api('/api/apple?bundleId='+encodeURIComponent(p.bundleId))).apple}catch{};const name=a?.trackName||p.name, cat=a?.primaryGenreName||p.category||'IPA', screens=(p.screenshots?.length?p.screenshots:a?.screenshotUrls)||[], devices=(p.supportedDevices?.length?p.supportedDevices:a?.supportedDevices)||[];let bought=purchases.includes(id), inCart=cart.includes(id);let action=p.priceMode==='paid'?(bought?`<a class="download" href="${esc(p.downloadUrl||'#')}" target="_blank"><i class="fa-solid fa-download"></i>${T('Download IPA','تحميل IPA')}</a>`:`<button class="download" onclick="addCart('${esc(id)}')"><i class="fa-solid fa-cart-plus"></i>${inCart?T('IPA Added To Cart','تمت الإضافة للسلة'):T('Add IPA To Cart','أضف IPA للسلة')}</button><button class="demo" onclick="demoBuy('${esc(id)}')"><i class="fa-solid fa-flask"></i>${T('Buy IPA As Demo','شراء تجريبي')}</button><p class="locked">${T('Demo purchase saves this in My Purchases, but real paid download stays locked until Stripe is connected.','الشراء التجريبي يحفظ الملف في مشترياتي، لكن التحميل الحقيقي يبقى مقفلاً حتى يتم ربط Stripe.')}</p>`):`<a class="download" href="${esc(p.downloadUrl||'#')}" target="_blank"><i class="fa-solid fa-download"></i>${T('Download IPA','تحميل IPA')}</a>`;return layout(`<section class="detail"><img class="detailicon" src="${esc(p.iconUrl||a?.artworkUrl512||LOGO)}"><h1>${esc(name)} IPA</h1><div class="chips"><span>${esc(money(p))}</span><span>v${esc(p.ipaVersion||'N/A')}</span><span>${esc(cat)}</span><span>iOS</span></div><div class="rating"><div>${stars(a?.averageUserRating||0)}</div><strong>${esc(a?.averageUserRating||0)}</strong><span class="muted">(${esc(a?.userRatingCount||0)})</span></div>${action}<div class="grid">${info('App Name',name)}${info('IPA Version',p.ipaVersion||'N/A')}${info('App Store Version',a?.version||p.appStoreVersion||'N/A')}${info('Updated',new Date(p.updatedAt||Date.now()).toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'}))}${info('Size',p.size||'N/A')}${info('Category',cat)}${info('Post Views',p.views||0)}${info('Bundle ID',p.bundleId||'N/A')}</div><section class="section"><h2>${T('Supported Devices','الأجهزة المدعومة')}</h2><p class="muted">${esc(devices.join(', ')||'N/A')}</p></section><section class="section"><h2>${T('Mod Features','المميزات')}</h2><p class="muted">${esc(p.modFeatures||'No features added yet.')}</p></section><section class="section"><h2>${T('Screenshots','الصور')}</h2><div class="shots">${screens.length?screens.map(u=>`<img src="${esc(u)}">`).join(''):`<div class="empty">No screenshots.</div>`}</div></section><section class="section"><h2>${T('Purchase Policy','سياسة الشراء')}</h2><p class="locked">${T('All IPA purchases are final and non-refundable. For purchase or access issues, contact support:','كل مشتريات IPA نهائية وغير قابلة للاسترداد. لأي مشكلة في الشراء أو الوصول، تواصل مع الدعم:')} ${SUPPORT}</p></section></section>`)}
function info(k,v){return `<div class="info"><span><i class="fa-solid fa-circle-info"></i></span><div><p>${esc(k)}</p><strong>${esc(v)}</strong></div></div>`}
function addCart(id){if(!cart.includes(id))cart.push(id);save();render()}function demoBuy(id){if(!user){alert(T('Create a demo account first.','أنشئ حساباً تجريبياً أولاً.'));go('/auth');return}if(!purchases.includes(id))purchases.push(id);cart=cart.filter(x=>x!==id);save();alert(T('Demo purchase saved. Real paid download remains locked until Stripe is connected.','تم حفظ الشراء التجريبي. التحميل المدفوع الحقيقي يبقى مقفلاً حتى يتم ربط Stripe.'));go('/purchases')}
function auth(){return layout(`<section class="detail"><h1>${user?T('Account','الحساب'):T('Sign In / Sign Up','تسجيل الدخول / إنشاء حساب')}</h1>${user?`<p class="muted">${T('Signed in as','تم تسجيل الدخول باسم')} <b>${esc(user.email)}</b></p><button class="download" onclick="go('/purchases')">${T('My Purchases','مشترياتي')}</button><button class="demo" onclick="user=null;save();render()">${T('Log Out','تسجيل الخروج')}</button>`:`<p class="muted">${T('Demo account mode. It saves cart and demo purchases on this device until real Firebase Auth + Stripe are connected.','وضع حساب تجريبي. يتم حفظ السلة والمشتريات التجريبية على هذا الجهاز حتى يتم ربط Firebase Auth و Stripe الحقيقي.')}</p><div class="form"><input id="email" type="email" placeholder="email@example.com"><input id="name" placeholder="${T('Display name','اسم العرض')}"><button class="download" onclick="login()">${T('Continue','متابعة')}</button></div>`}</section>`)}
function login(){let email=document.getElementById('email').value.trim(), name=document.getElementById('name').value.trim()||'Ashier Customer';if(!email.includes('@'))return alert(T('Enter a valid email.','أدخل بريداً إلكترونياً صحيحاً.'));user={email,name,createdAt:new Date().toISOString()};save();render()}
function cartPage(){let items=posts.filter(p=>cart.includes(p.id)),total=items.reduce((s,p)=>s+Number(p.price||0),0);return layout(`<section class="detail"><h1>${T('Cart','السلة')}</h1>${items.length?`<div class="list">${items.map(card).join('')}</div><div class="total"><span>${T('Total','المجموع')}</span><strong>${total.toFixed(2)} USD</strong></div><button class="download" onclick="checkoutDemo()"><i class="fa-solid fa-flask"></i>${T('Checkout Demo','دفع تجريبي')}</button><p class="locked">${T('Stripe is not connected yet. Demo checkout saves items to My Purchases but does not unlock real paid downloads.','Stripe غير متصل حالياً. الدفع التجريبي يحفظ العناصر في مشترياتي لكنه لا يفتح التحميلات المدفوعة الحقيقية.')}</p>`:`<div class="empty">${T('Your cart is empty.','السلة فارغة.')}</div>`}</section>`)}
function checkoutDemo(){if(!user){alert(T('Create a demo account first.','أنشئ حساباً تجريبياً أولاً.'));go('/auth');return}cart.forEach(id=>{if(!purchases.includes(id))purchases.push(id)});cart=[];save();alert(T('Demo checkout complete.','اكتمل الدفع التجريبي.'));go('/purchases')}
function purchasesPage(){let items=posts.filter(p=>purchases.includes(p.id));return layout(`<section class="detail"><h1>${T('My Purchases','مشترياتي')}</h1>${!user?`<p class="locked">${T('Sign in to keep purchase access on this device.','سجّل الدخول للحفاظ على الوصول للمشتريات على هذا الجهاز.')}</p><button class="download" onclick="go('/auth')">${T('Sign In / Sign Up','تسجيل الدخول / إنشاء حساب')}</button>`:''}${items.length?`<div class="receipt"><strong>${T('Demo Receipt','إيصال تجريبي')}</strong><p class="muted">${T('Saved in demo mode. Real Stripe receipts can be connected later.','محفوظ في الوضع التجريبي. يمكن ربط إيصالات Stripe الحقيقية لاحقاً.')}</p></div><div class="list">${items.map(card).join('')}</div>`:`<div class="empty">${T('No purchases yet.','لا توجد مشتريات بعد.')}</div>`}<p class="locked">${T('Need help? Contact:','تحتاج مساعدة؟ تواصل مع:')} ${SUPPORT}</p></section>`)}
async function render(){let r=route();if(r==='/')document.getElementById('app').innerHTML=home();else if(r==='/cart')document.getElementById('app').innerHTML=cartPage();else if(r==='/purchases')document.getElementById('app').innerHTML=purchasesPage();else if(r==='/auth')document.getElementById('app').innerHTML=auth();else if(r.startsWith('/ipa/'))document.getElementById('app').innerHTML=await detail(r.split('/').pop());else document.getElementById('app').innerHTML=layout('<section class="detail"><h1>404</h1></section>')}
addEventListener('hashchange',render);document.getElementById('app').innerHTML=layout('<section class="detail"><h1>Loading...</h1></section>');load();
</script>
</body>
</html>
