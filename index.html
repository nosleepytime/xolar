    :root{--bg:#000;--panel:rgba(12,12,12,.92);--panel2:rgba(19,19,19,.84);--border:rgba(98,255,70,.18);--text:#f7fff4;--muted:#8e988d;--green:#62ff46;--green2:#20e999;--pink:#ff3df2;--red:#ff4057;--shadow:0 25px 80px rgba(0,0,0,.72);--radius:28px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#000;color:var(--text);font-family:Inter,Arial,sans-serif;overflow-x:hidden}button,input{font:inherit}button{border:0;background:none;color:inherit;cursor:pointer}a{color:inherit}.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(circle at 16% 0%,rgba(98,255,70,.14),transparent 26%),radial-gradient(circle at 82% 8%,rgba(255,61,242,.08),transparent 22%),linear-gradient(180deg,#000,#050505 55%,#000)}.bg:after{content:"";position:absolute;inset:0;background-image:linear-gradient(135deg,rgba(255,255,255,.025) 25%,transparent 25%);background-size:42px 42px;opacity:.25}.top{position:sticky;top:0;z-index:30;min-height:calc(88px + env(safe-area-inset-top));padding:calc(16px + env(safe-area-inset-top)) 22px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(0,0,0,.78);border-bottom:1px solid var(--border);backdrop-filter:blur(24px)}.brand img{width:142px;max-height:56px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(98,255,70,.25))}.brand.round img{width:66px;height:66px;border-radius:999px;object-fit:cover;border:1px solid rgba(98,255,70,.35)}.actions{display:flex;gap:10px}.icon{width:54px;height:54px;display:grid;place-items:center;border-radius:17px;background:rgba(14,14,14,.92);border:1px solid rgba(98,255,70,.12);font-size:21px}.promo{position:relative;overflow:hidden;flex:0 0 auto;padding:14px 24px;border-radius:999px;text-transform:uppercase;font-weight:900;letter-spacing:1px;background:#050505}.promo:before{content:"";position:absolute;inset:-3px;z-index:-1;background:conic-gradient(#62ff46,#20e999,#ff3df2,#62ff46);animation:spin 3s linear infinite}.promo:after{content:"";position:absolute;inset:3px;z-index:-1;border-radius:999px;background:#050505}@keyframes spin{to{transform:rotate(360deg)}}.drawer{position:fixed;top:calc(92px + env(safe-area-inset-top));right:18px;z-index:40;display:none;min-width:260px;padding:12px;border-radius:22px;background:rgba(8,8,8,.98);border:1px solid var(--border);box-shadow:var(--shadow)}.drawer.open{display:grid;gap:8px}.drawer button{text-align:left;padding:14px 16px;border-radius:14px;color:var(--muted);font-weight:900}.drawer button:hover{background:rgba(98,255,70,.1);color:var(--text)}.page{width:min(100%,980px);margin:auto;padding:26px 22px 52px}.hero,.listHero{padding:54px 0 32px}.center{text-align:center}.crumb{color:var(--muted);font-weight:900;display:flex;gap:10px;flex-wrap:wrap;align-items:center}.center .crumb{justify-content:center}.crumb button{color:var(--muted);font-weight:900}h1{margin:12px 0;font-size:clamp(46px,10vw,84px);line-height:.92;letter-spacing:-3px;font-family:Orbitron,Inter,sans-serif;font-weight:900;text-transform:lowercase;text-shadow:0 0 28px rgba(98,255,70,.22)}.upper{text-transform:uppercase}.sub{max-width:780px;color:var(--muted);font-size:18px;line-height:1.65;font-weight:800}.center .sub{margin-left:auto;margin-right:auto}.stat{margin-top:22px;width:225px;padding:22px;border-radius:28px;background:linear-gradient(135deg,rgba(98,255,70,.16),rgba(0,0,0,.62));border:1px solid var(--border)}.stat span{color:var(--muted);font-weight:900}.stat strong{display:block;font-size:48px}.panel{margin:28px 0 42px;padding:32px;border-radius:var(--radius);background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow)}.head{display:grid;gap:22px;margin-bottom:26px}.title{display:flex;gap:18px;align-items:center}.badgeIcon{width:70px;height:70px;border-radius:22px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green2),#5fd187);font-size:27px;box-shadow:0 0 34px rgba(32,233,153,.35)}.title h2{margin:0;font-size:clamp(34px,7vw,56px);line-height:1;font-weight:900;letter-spacing:-2px}.view{width:100%;padding:18px;border-radius:17px;background:rgba(18,18,18,.78);font-weight:900;font-size:21px}.list{display:grid;gap:22px}.card{position:relative;display:grid;grid-template-columns:96px 1fr auto;gap:18px;align-items:center;padding:22px;min-height:145px;border-radius:24px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;box-shadow:0 18px 60px rgba(0,0,0,.78);transition:.18s}.card:hover{transform:translateY(-2px);border-color:rgba(98,255,70,.55)}.iconWrap{position:relative;width:90px;height:90px}.iconWrap img{width:90px;height:90px;border-radius:18px;object-fit:cover;background:#050505}.pill{position:absolute;left:8px;bottom:-10px;padding:7px 12px;border-radius:999px;background:#ef3d42;color:#fff;font-weight:900;font-size:14px;letter-spacing:1px}.paid{background:linear-gradient(135deg,#ff3df2,#ff4057)!important}.free{background:linear-gradient(135deg,#20e999,#62ff46)!important;color:#001006!important}.apple{position:absolute;right:-10px;top:-10px;width:34px;height:34px;display:grid;place-items:center;border-radius:10px;background:#050505}.main{min-width:0}.main h3{margin:0 0 12px;font-size:clamp(23px,5vw,33px);line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{display:flex;flex-wrap:wrap;gap:12px;color:var(--muted);font-size:19px;font-weight:900}.meta span:first-child{padding:5px 12px;border-radius:10px;background:rgba(98,255,70,.10)}.main p{margin:12px 0 0;color:var(--muted);font-size:19px;font-weight:800}.update{align-self:start;padding:9px 15px;border-radius:12px;background:linear-gradient(135deg,#18ce81,#48d18d);font-weight:900}.empty,.loading{min-height:180px;display:grid;place-items:center;text-align:center;border-radius:24px;background:rgba(14,14,14,.72);color:var(--muted);font-weight:900;font-size:21px;padding:24px}.search{display:flex;align-items:center;gap:14px;width:100%;padding:20px;border-radius:18px;border:1px solid var(--border);background:rgba(14,14,14,.86)}.search input,.form input{width:100%;outline:none;border:0;background:transparent;color:var(--text);font-size:19px}.form{display:grid;gap:14px;margin-top:24px}.form input{padding:20px;border-radius:18px;border:1px solid var(--border);background:rgba(14,14,14,.86)}.detail{text-align:center}.bigIcon img{width:220px;height:220px;border-radius:42px;object-fit:cover;border:1px solid var(--border);background:#050505}.detailTitle{text-transform:none;font-family:Inter,Arial,sans-serif;font-size:clamp(34px,8vw,56px);letter-spacing:-2px;line-height:1.15}.chips,.rating{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;margin:22px 0}.chips span{padding:10px 18px;border-radius:12px;background:rgba(12,12,12,.8);border:1px solid var(--border);text-transform:uppercase;font-weight:900}.rating{align-items:center;width:fit-content;margin-inline:auto;padding:16px 22px;border-radius:22px;background:rgba(12,12,12,.7)}.stars{display:flex;gap:6px}.star{width:33px;height:33px}.btn{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;margin:18px 0 12px;padding:22px;border-radius:20px;color:#fff;text-decoration:none;text-transform:uppercase;background:linear-gradient(135deg,#15df8c,#11b992);font-size:21px;font-weight:900;box-shadow:0 0 38px rgba(32,233,153,.24)}.btn2{background:rgba(18,18,18,.9);border:1px solid var(--border);box-shadow:none}.note{color:var(--muted);font-weight:800;line-height:1.6}.grid{display:grid;gap:18px;margin-top:28px}.info{display:grid;grid-template-columns:70px 1fr;gap:18px;align-items:center;text-align:left;padding:20px;border-radius:22px;background:rgba(14,14,14,.72);border:1px solid var(--border)}.info>span{width:58px;height:58px;display:grid;place-items:center;border-radius:18px;background:rgba(32,233,153,.14);color:var(--green);font-size:24px}.info p{margin:0 0 6px;color:var(--muted);text-transform:uppercase;font-weight:900}.info strong{display:block;word-break:break-word;font-size:21px}.box,.features,.ad{margin-top:22px;padding:22px;border-radius:22px;background:rgba(14,14,14,.72);border:1px solid var(--border);text-align:left}.box summary{display:flex;justify-content:space-between;font-size:23px;font-weight:900;cursor:pointer}.devices{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.devices span{padding:9px 12px;border-radius:999px;background:rgba(98,255,70,.10);color:var(--muted);font-weight:800}.features h2{margin:0 0 14px}.features p{white-space:pre-line;color:var(--muted);line-height:1.65;font-weight:800}.shots{display:flex;gap:18px;overflow-x:auto;padding-bottom:10px}.shots img{width:245px;max-height:520px;object-fit:cover;border-radius:22px;border:1px solid var(--border)}.special,.receipt,.total{display:flex;align-items:center;gap:18px;margin-top:22px;padding:22px;border-radius:22px;background:linear-gradient(135deg,rgba(98,255,70,.12),rgba(255,61,242,.08));border:1px solid var(--border);text-align:left}.total{justify-content:space-between;font-size:23px;font-weight:900}.plans{display:grid;gap:18px}.plan{padding:24px;border-radius:24px;background:rgba(14,14,14,.72);border:1px solid var(--border);text-align:left}.plan h3{margin:0 0 10px;font-size:30px}.plan strong{font-size:38px}.ad{text-align:center;color:var(--muted);font-weight:900;display:grid;place-items:center;min-height:110px}.notFound{min-height:70vh;display:grid;place-items:center;text-align:center}.notFound h1{color:var(--green);font-size:100px}.spin{width:58px;height:58px;border:6px solid rgba(255,255,255,.12);border-top-color:var(--green2);border-radius:50%;animation:spin 1s linear infinite}.foot{padding:28px 20px 42px;text-align:center;color:var(--muted);font-weight:800}.elNav{display:flex;gap:10px;overflow-x:auto;max-width:58vw}.elNav button{padding:13px 16px;border-radius:999px;background:rgba(18,18,18,.86);border:1px solid var(--border);font-weight:900;white-space:nowrap}.orb{width:154px;height:154px;margin:0 auto 24px;padding:5px;border-radius:999px;background:conic-gradient(#62ff46,#20e999,#ff3df2,#62ff46);animation:spin 4s linear infinite}.orb img{width:100%;height:100%;border-radius:999px;object-fit:cover;border:6px solid #050505}.links{display:grid;gap:14px;margin:28px 0}.links a{display:flex;justify-content:center;gap:14px;align-items:center;padding:18px;border-radius:18px;text-decoration:none;font-weight:900;background:rgba(18,18,18,.82);border:1px solid var(--border)}@media(max-width:760px){.promo,.elNav{display:none}.brand img{width:118px}.brand.round img{width:62px;height:62px}.page{padding-inline:14px}.panel{padding:24px 16px}.card{grid-template-columns:84px 1fr;min-height:136px;padding:18px}.iconWrap,.iconWrap img{width:78px;height:78px}.main h3{font-size:25px}.meta,.main p{font-size:17px}.update{position:absolute;top:26px;right:16px;font-size:13px}.bigIcon img{width:180px;height:180px}.badgeIcon{width:60px;height:60px}}

<body>
<div id="app"></div>
<script type="module">
const CONFIG={siteName:'xolar',logoUrl:'/favicon.svg',elLogo:'https://github.com/nosleepytime/xolar/raw/refs/heads/main/IMG_4517.jpeg',supportEmail:'app.celeste.isp@protonmail.com',telegramContact:'https://t.me/ashierx7',telegramChannel:'https://t.me/vnxgangs'};
const state={posts:[],elPosts:[],apple:new Map(),query:'',route:location.pathname,user:read('xolar_user',null),globalCart:read('xolar_cart',[]),elCart:read('el_chapo_cart',[]),globalPurchases:[],elPurchases:[],subscription:null};
const $=(s,r=document)=>r.querySelector(s);function read(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch{return f}}function write(k,v){localStorage.setItem(k,JSON.stringify(v))}function saveUser(u){state.user=u;u?write('xolar_user',u):localStorage.removeItem('xolar_user')}function saveCarts(){write('xolar_cart',state.globalCart);write('el_chapo_cart',state.elCart)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function fmt(v){return v?new Intl.DateTimeFormat('en-US',{month:'short',day:'2-digit',year:'numeric'}).format(new Date(v)):'Unknown'}function recent(v){return v&&((Date.now()-new Date(v).getTime())/86400000<=5)}function byU(a,b){return new Date(b.updatedAt)-new Date(a.updatedAt)}function byC(a,b){return new Date(b.createdAt)-new Date(a.createdAt)}function money(p){return p.priceMode==='paid'?`${Number(p.price||0).toFixed(2)} ${p.currency||'USD'}`:'Free'}
async function api(path,opt){const r=await fetch(path,opt);const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error(d.error||'Request failed');return d}async function loadPosts(){state.posts=(await api('/api/posts')).posts||[]}async function loadEl(){state.elPosts=(await api('/api/el-chapo/posts')).posts||[]}async function apple(bundleId){if(!bundleId)return null;if(state.apple.has(bundleId))return state.apple.get(bundleId);try{const d=await api('/api/apple?bundleId='+encodeURIComponent(bundleId));state.apple.set(bundleId,d.apple||null);return d.apple||null}catch{state.apple.set(bundleId,null);return null}}async function loadPurch(scope='global'){if(!state.user?.email)return {posts:[],subscription:null};const d=await api(`/api/stripe/purchases?scope=${scope}&email=${encodeURIComponent(state.user.email)}`);if(scope==='elChapo')state.elPurchases=d.posts||[];else{state.globalPurchases=d.posts||[];state.subscription=d.subscription||null}return d}function nav(path){history.pushState({},'',path);state.route=location.pathname;render();scrollTo({top:0,behavior:'smooth'})}addEventListener('popstate',()=>{state.route=location.pathname;render()});
function shell(content,el=false){return `<div class="bg"></div><header class="top"><button class="brand ${el?'round':''}" data-nav="${el?'/el-chapo':'/'}"><img src="${el?esc(CONFIG.elLogo):esc(CONFIG.logoUrl)}" alt="logo"></button>${el?`<div class="elNav"><button data-nav="/el-chapo">Store</button><button data-nav="/el-chapo/cart">Cart ${state.elCart.length?`(${state.elCart.length})`:''}</button><button data-nav="/el-chapo/purchases">My Purchases</button><button data-nav="/payments">Manage Payments</button></div>`:`<button class="promo" data-nav="/el-chapo"><span>EL CHAPO</span></button>`}<div class="actions"><button class="icon" data-nav="/search"><i class="fa-solid fa-magnifying-glass"></i></button><button class="icon" id="menu"><i class="fa-solid fa-bars"></i></button></div></header><nav class="drawer" id="drawer">${el?`<button data-nav="/">xolar Home</button><button data-nav="/el-chapo">EL CHAPO Store</button><button data-nav="/el-chapo/cart">Cart</button><button data-nav="/el-chapo/purchases">My Purchases</button><button data-nav="/account">Account</button><button data-nav="/payments">Manage Payments</button><button data-nav="/support">Support Us</button>`:`<button data-nav="/">Home</button><button data-nav="/paid">Paid IPA Files</button><button data-nav="/subscriptions">Subscriptions</button><button data-nav="/support">Support Us</button><button data-nav="/cart">Cart ${state.globalCart.length?`(${state.globalCart.length})`:''}</button><button data-nav="/purchases">My Purchases</button><button data-nav="/account">Account</button><button data-nav="/payments">Manage Payments</button><button data-nav="/support">Support Us</button><button data-nav="/el-chapo">EL CHAPO Store</button><button data-nav="/updates/apps">Latest App Updates</button><button data-nav="/apps">IPA Apps</button><button data-nav="/updates/games">Latest Game Updates</button><button data-nav="/games">IPA Games</button><button data-nav="/search">Search</button>`}</nav><main class="page">${content}</main><footer class="foot">${el?'EL CHAPO developer page':'© '+new Date().getFullYear()+' xolar — Global IPA Library'} · Support: <a href="mailto:${CONFIG.supportEmail}">${CONFIG.supportEmail}</a></footer>`}
function empty(t){return `<div class="empty">${esc(t)}</div>`}function card(p,scope='global'){const href=scope==='el'?`/el-chapo/ipa/${p.id}`:`/ipa/${p.id}`;const pill=p.priceMode==='paid'?'PAID':scope==='el'?'FREE':'IPA';return `<article class="card" data-nav="${href}"><div class="iconWrap"><img src="${esc(p.iconUrl|| (scope==='el'?CONFIG.elLogo:'/favicon.svg'))}" alt="${esc(p.name)}"><span class="pill ${p.priceMode==='paid'?'paid':scope==='el'?'free':''}">${pill}</span><span class="apple"><i class="fa-brands fa-apple"></i></span></div><div class="main"><h3>${esc(p.name)}</h3><div class="meta"><span>${esc(p.category||(p.type==='game'?'Games':'Apps'))}</span><span>${esc(p.size||'N/A')}</span></div><p>${p.priceMode==='paid'?esc(money(p))+' · ':''}v${esc(p.ipaVersion||'N/A')}</p></div>${recent(p.updatedAt)?'<span class="update">UPDATE</span>':''}</article>`}
function section(title,icon,posts,path,scope='global'){return `<section class="panel"><div class="head"><div class="title"><span class="badgeIcon"><i class="${icon}"></i></span><h2>${esc(title)}</h2></div>${path?`<button class="view" data-nav="${path}">View All</button>`:''}</div><div class="list">${posts.slice(0,6).map(p=>card(p,scope)).join('')||empty('No IPA found yet.')}</div></section>`}
function home(){const apps=state.posts.filter(p=>p.type==='app'&&p.priceMode!=='paid'),games=state.posts.filter(p=>p.type==='game'&&p.priceMode!=='paid'),paid=state.posts.filter(p=>p.priceMode==='paid');return shell(`<section class="hero"><p class="crumb">Home</p><h1>xolar</h1><p class="sub">Global IPA Library with free files, paid IPA purchases, subscriptions, search, screenshots, and MediaFire links.</p><div class="stat"><span>Total IPAs</span><strong>${state.posts.length}</strong></div></section>${section('Paid IPA Files','fa-solid fa-credit-card',paid.sort(byU),'/paid')}${subPromo()}${supportPromo()}${section('Latest IPA Update','fa-solid fa-bolt',[...apps].sort(byU),'/updates/apps')}${section('IPA Apps','fa-solid fa-layer-group',[...apps].sort(byC),'/apps')}${section('Latest IPA Games','fa-solid fa-gamepad',[...games].sort(byU),'/updates/games')}${section('IPA Games','fa-solid fa-trophy',[...games].sort(byC),'/games')}`)}function subPromo(){return `<section class="panel"><div class="title"><span class="badgeIcon"><i class="fa-solid fa-crown"></i></span><h2>Subscriptions</h2></div><p class="sub">Subscribe to unlock all eligible paid IPA files on xolar.</p><button class="btn" data-nav="/subscriptions"><i class="fa-solid fa-crown"></i> View Subscription Plans</button></section>`}
function supportPromo(){return `<section class="panel"><div class="title"><span class="badgeIcon"><i class="fa-solid fa-heart"></i></span><h2>Support Us</h2></div><p class="sub">Help support xolar development, hosting, maintenance, and future features.</p><button class="btn btn2" data-nav="/support"><i class="fa-solid fa-heart"></i> Support Us With Stripe</button></section>`}
function supportPage(){return shell(`<section class="panel detail"><h1>Support Us</h1><p class="sub">Your support helps keep xolar online, improve the IPA library, maintain EL CHAPO pages, and build new features. This is a voluntary support payment through Stripe.</p>${!state.user?`<p class="note">You can support without an account, but signing in with your email makes it easier for support if there is an issue.</p><button class="btn btn2" data-nav="/account">Sign In / Sign Up</button>`:`<p class="note">Signed in as ${esc(state.user.email)}.</p>`}<div class="plans"><div class="plan"><h3>Small Support</h3><strong>$3</strong><p class="note">A small contribution to help hosting and maintenance.</p><button class="btn" data-support="300"><i class="fa-solid fa-heart"></i> Support $3</button></div><div class="plan"><h3>Standard Support</h3><strong>$5</strong><p class="note">A helpful contribution toward updates and development.</p><button class="btn" data-support="500"><i class="fa-solid fa-heart"></i> Support $5</button></div><div class="plan"><h3>Big Support</h3><strong>$10</strong><p class="note">A bigger contribution for future features and improvements.</p><button class="btn" data-support="1000"><i class="fa-solid fa-heart"></i> Support $10</button></div></div><p class="note">Support payments are processed by Stripe. This is not a subscription and does not unlock paid IPA files.</p></section>`)}
function listPage(kind){let title='Paid IPA Files',posts=state.posts.filter(p=>p.priceMode==='paid').sort(byU);if(kind==='apps'){title='IPA Apps';posts=state.posts.filter(p=>p.type==='app'&&p.priceMode!=='paid').sort(byC)}if(kind==='games'){title='IPA Games';posts=state.posts.filter(p=>p.type==='game'&&p.priceMode!=='paid').sort(byC)}if(kind==='updates/apps'){title='Latest IPA Update';posts=state.posts.filter(p=>p.type==='app'&&p.priceMode!=='paid').sort(byU)}if(kind==='updates/games'){title='Latest IPA Games Update';posts=state.posts.filter(p=>p.type==='game'&&p.priceMode!=='paid').sort(byU)}return shell(`<section class="listHero"><p class="crumb"><button data-nav="/">Home</button><i class="fa-solid fa-chevron-right"></i>${title}</p><h1>${title}</h1></section><section class="list">${posts.map(p=>card(p)).join('')||empty('No IPA found.')}</section>`)}
function searchPage(){const q=state.query.toLowerCase();const res=state.posts.filter(p=>!q||[p.name,p.bundleId,p.category,p.type,p.ipaVersion,p.priceMode,...(p.tags||[])].join(' ').toLowerCase().includes(q));return shell(`<section class="listHero"><p class="crumb"><button data-nav="/">Home</button><i class="fa-solid fa-chevron-right"></i>Search</p><h1>Search</h1><div class="search"><i class="fa-solid fa-magnifying-glass"></i><input id="liveSearch" value="${esc(state.query)}" placeholder="Search IPAs, bundle IDs, versions, categories..." autofocus></div></section><section class="list">${res.sort(byU).map(p=>card(p)).join('')||empty('No result found.')}</section>`)}
function star(v){const r=Number(v||0);let out='';for(let i=1;i<=5;i++){let pct=Math.max(0,Math.min(100,(r-(i-1))*100)),id='s'+Math.random().toString(36).slice(2);out+=`<svg class="star" viewBox="0 0 24 24"><defs><linearGradient id="${id}"><stop offset="${pct}%" stop-color="#ffc629"/><stop offset="${pct}%" stop-color="#344052"/></linearGradient></defs><path fill="url(#${id})" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`}return out}function info(l,v){return `<div class="info"><span><i class="fa-solid fa-circle-info"></i></span><div><p>${esc(l)}</p><strong>${esc(v)}</strong></div></div>`}
async function hasAccess(scope,id){if(!state.user?.email)return false;try{await loadPurch(scope)}catch{}return (scope==='elChapo'?state.elPurchases:state.globalPurchases).some(p=>p.id===id)}function detailTpl({p,a,name,cat,screens,devs,action,back,backText}){return `<section class="panel detail"><p class="crumb"><button data-nav="${back}">${backText}</button><i class="fa-solid fa-chevron-right"></i>${esc(name)}</p><div class="bigIcon"><img src="${esc(p.iconUrl||a?.artworkUrl512||'/favicon.svg')}" alt="${esc(name)}"></div><h1 class="detailTitle">${esc(name)} IPA v${esc(p.ipaVersion||'N/A')}</h1><div class="chips">${p.priceMode==='paid'?`<span>${esc(money(p))}</span>`:''}<span>v${esc(p.ipaVersion||'N/A')}</span><span>${esc(cat)}</span><span>iOS</span></div><div class="rating"><div class="stars">${star(a?.averageUserRating||0)}</div><strong>${esc(a?.averageUserRating||0)}</strong><span>(${esc(a?.userRatingCount||0)})</span></div>${action}<div class="grid">${info('App Name',name)}${info('IPA Version',p.ipaVersion||'N/A')}${info('App Store Version',a?.version||p.appStoreVersion||'N/A')}${info('Updated',fmt(p.updatedAt))}${info('Size',p.size||'N/A')}${info('Category',cat)}${info('Post Views',p.views??'0')}${info('Bundle ID',p.bundleId||'N/A')}</div><details class="box"><summary>Supported Devices <i class="fa-solid fa-chevron-down"></i></summary><div class="devices">${devs.length?devs.map(d=>`<span>${esc(d)}</span>`).join(''):'<span>N/A</span>'}</div></details><section class="features"><h2>Mod Features</h2><p>${esc(p.modFeatures||'No features added yet.')}</p></section><section class="features"><h2>Screenshots</h2><div class="shots">${screens.length?screens.map(u=>`<img src="${esc(u)}" alt="Screenshot" loading="lazy">`).join(''):empty('No screenshots.')}</div></section></section>`}
async function globalDetail(id){const p=state.posts.find(x=>x.id===id);if(!p)return notFound();fetch('/api/views/'+encodeURIComponent(id),{method:'POST'}).catch(()=>{});const a=await apple(p.bundleId),name=a?.trackName||p.name,cat=a?.primaryGenreName||p.category||'IPA',screens=p.screenshots?.length?p.screenshots:(a?.screenshotUrls||[]),devs=p.supportedDevices?.length?p.supportedDevices:(a?.supportedDevices||[]);let action='';if(p.priceMode==='paid'){const access=await hasAccess('global',id),inCart=state.globalCart.includes(id);action=access?`<a class="btn" href="${esc(p.downloadUrl||'#')}" target="_blank"><i class="fa-solid fa-download"></i> Download IPA</a>`:`<button class="btn" data-add-global="${esc(id)}"><i class="fa-solid fa-cart-plus"></i> ${inCart?'IPA Added To Cart':'Add IPA To Cart'}</button><button class="btn btn2" data-nav="/subscriptions"><i class="fa-solid fa-crown"></i> Unlock With Subscription</button><p class="note">Buy this IPA once or unlock eligible paid files with a subscription.</p>`}else action=`<a class="btn" href="${esc(p.downloadUrl||'#')}" target="_blank"><i class="fa-solid fa-download"></i> Download IPA</a>`;return shell(detailTpl({p,a,name,cat,screens,devs,action,back:'/',backText:'Home'}))}
function elHome(){const paid=state.elPosts.filter(p=>p.priceMode==='paid').sort(byU),free=state.elPosts.filter(p=>p.priceMode!=='paid').sort(byU);return shell(`<section class="hero center"><div class="orb"><img src="${esc(CONFIG.elLogo)}" alt="EL CHAPO"></div><p class="crumb">Developer Store</p><h1 class="upper">EL CHAPO</h1><p class="sub">A separate developer page for EL CHAPO IPA releases, premium drops, free content, announcements, and support.</p><div class="links"><a href="${CONFIG.telegramContact}" target="_blank"><i class="fa-brands fa-telegram"></i> Contact EL CHAPO</a><a href="${CONFIG.telegramChannel}" target="_blank"><i class="fa-brands fa-telegram"></i> Join Telegram Channel</a><a href="mailto:${CONFIG.supportEmail}"><i class="fa-solid fa-headset"></i> Customer Support</a></div><div class="special"><i class="fa-solid fa-shield-halved"></i><div><strong>Paid Store</strong><p class="note">Paid EL CHAPO IPAs use Stripe Checkout. All sales are final and non-refundable.</p></div></div></section>${section('Premium IPAs','fa-solid fa-bag-shopping',paid,null,'el')}${section('Free Content','fa-solid fa-gift',free,null,'el')}`,true)}
async function elDetail(id){const p=state.elPosts.find(x=>x.id===id);if(!p)return shell(notInner(),true);fetch('/api/el-chapo/views/'+encodeURIComponent(id),{method:'POST'}).catch(()=>{});const a=await apple(p.bundleId),name=a?.trackName||p.name,cat=a?.primaryGenreName||p.category||'IPA',screens=p.screenshots?.length?p.screenshots:(a?.screenshotUrls||[]),devs=p.supportedDevices?.length?p.supportedDevices:(a?.supportedDevices||[]);let action='';if(p.priceMode==='paid'){const access=await hasAccess('elChapo',id),inCart=state.elCart.includes(id);action=access?`<a class="btn" href="${esc(p.downloadUrl||'#')}" target="_blank"><i class="fa-solid fa-download"></i> Download IPA</a>`:`<button class="btn" data-add-el="${esc(id)}"><i class="fa-solid fa-cart-plus"></i> ${inCart?'IPA Added To Cart':'Add IPA To Cart'}</button><p class="note">Complete Stripe Checkout to unlock this file in My Purchases.</p>`}else action=`<a class="btn" href="${esc(p.downloadUrl||'#')}" target="_blank"><i class="fa-solid fa-download"></i> Download IPA</a>`;return shell(detailTpl({p,a,name,cat,screens,devs,action,back:'/el-chapo',backText:'EL CHAPO Store'})+`<section class="features"><h2>Purchase Policy</h2><p>All IPA purchases are final and non-refundable. If there is an issue, contact ${CONFIG.supportEmail}</p></section>`,true)}
function account(){return shell(`<section class="panel detail"><h1>Account</h1>${state.user?`<p class="sub">Signed in as <strong>${esc(state.user.email)}</strong></p><button class="btn" data-nav="/purchases">My Purchases</button><button class="btn btn2" data-nav="/payments">Manage Payments</button><button class="btn btn2" id="logout">Log Out</button>`:`<p class="sub">Use the same email you use at Stripe Checkout to recover purchases.</p><div class="form"><input id="email" type="email" placeholder="email@example.com"><input id="name" placeholder="Display name"><button class="btn" id="login">Continue</button></div>`}</section>`)}
function subs(){return shell(`<section class="panel detail"><h1>Subscriptions</h1><p class="sub">Unlock all eligible paid IPA files on the global xolar store. Manage or cancel through Stripe Customer Portal.</p><div class="plans"><div class="plan"><h3>Monthly Access</h3><strong>Monthly</strong><p class="note">Access all eligible paid IPA files while active.</p><button class="btn" data-sub="monthly"><i class="fa-solid fa-crown"></i> Subscribe Monthly</button></div><div class="plan"><h3>Yearly Access</h3><strong>Yearly</strong><p class="note">Access all eligible paid IPA files while active.</p><button class="btn" data-sub="yearly"><i class="fa-solid fa-crown"></i> Subscribe Yearly</button></div></div>${state.subscription?`<div class="receipt"><strong>Current Subscription</strong><p class="note">Status: ${esc(state.subscription.status||'unknown')} · Plan: ${esc(state.subscription.plan||'unknown')}</p></div>`:''}<button class="btn btn2" data-portal><i class="fa-solid fa-credit-card"></i> Manage Payments / Subscription</button></section>`)}
function cart(scope='global'){const isEl=scope==='elChapo',cart=isEl?state.elCart:state.globalCart,posts=isEl?state.elPosts:state.posts,items=posts.filter(p=>cart.includes(p.id)),total=items.reduce((s,p)=>s+Number(p.price||0),0);const body=`<section class="panel detail"><h1>Cart</h1>${items.length?`<div class="list">${items.map(p=>card(p,isEl?'el':'global')).join('')}</div><div class="total"><span>Total</span><strong>${total.toFixed(2)} USD</strong></div><button class="btn" data-checkout="${isEl?'elChapo':'global'}"><i class="fa-solid fa-credit-card"></i> Checkout With Stripe</button><p class="note">You will be redirected to Stripe Checkout. All IPA purchases are final and non-refundable.</p>`:empty('Your cart is empty.')}</section>`;return shell(body,isEl)}
async function purchases(scope='global'){if(state.user?.email)await loadPurch(scope).catch(()=>{});const isEl=scope==='elChapo',items=isEl?state.elPurchases:state.globalPurchases;const body=`<section class="panel detail"><h1>My Purchases</h1>${!state.user?`<p class="note">Sign in with the same email used at Stripe Checkout to recover purchases.</p><button class="btn" data-nav="/account">Sign In / Sign Up</button>`:`<p class="note">Signed in as ${esc(state.user.email)}.</p>`}${state.subscription&&!isEl?`<div class="receipt"><strong>Subscription</strong><p class="note">Status: ${esc(state.subscription.status||'unknown')} · Plan: ${esc(state.subscription.plan||'unknown')}</p></div>`:''}${items.length?`<div class="receipt"><strong>Unlocked Files</strong><p class="note">These IPAs are unlocked by Stripe payment or active subscription.</p></div><div class="list">${items.map(p=>card(p,isEl?'el':'global')).join('')}</div>`:empty('No purchases found for this email.')}<p class="note">Need help? Contact: ${CONFIG.supportEmail}</p></section>`;return shell(body,isEl)}
function payments(){return shell(`<section class="panel detail"><h1>Manage Payments</h1><p class="sub">Open Stripe Customer Portal to manage payment methods, invoices, and subscriptions.</p>${!state.user?`<button class="btn" data-nav="/account">Sign In First</button>`:`<p class="note">Signed in as ${esc(state.user.email)}</p><button class="btn" data-portal><i class="fa-solid fa-credit-card"></i> Open Stripe Customer Portal</button>`}</section>`)}function notInner(){return `<section class="notFound"><div><h1>404</h1><p>The page you are looking for does not exist.</p><button class="btn" data-nav="/">Back Home</button></div></section>`}function notFound(){return shell(notInner())}
async function render(){const app=$('#app'),p=state.route;if(p.startsWith('/ashierx7')){history.replaceState({},'',p.replace('/ashierx7','/el-chapo'));state.route=location.pathname;return render()}if(p.startsWith('/el-chapo')){if(!state.elPosts.length){app.innerHTML=shell('<section class="loading"><div class="spin"></div><p>Loading EL CHAPO Store...</p></section>',true);try{await loadEl()}catch(e){app.innerHTML=shell(`<section class="notFound"><div><h1>Error</h1><p>${esc(e.message)}</p></div></section>`,true);bind();return}}if(p==='/el-chapo')app.innerHTML=elHome();else if(p==='/el-chapo/cart')app.innerHTML=cart('elChapo');else if(p==='/el-chapo/purchases')app.innerHTML=await purchases('elChapo');else if(p==='/el-chapo/auth')app.innerHTML=account();else if(p.startsWith('/el-chapo/ipa/'))app.innerHTML=await elDetail(decodeURIComponent(p.split('/').pop()));else app.innerHTML=shell(notInner(),true);bind();return}if(!state.posts.length){app.innerHTML=shell('<section class="loading"><div class="spin"></div><p>Loading Global IPA Library...</p></section>');try{await loadPosts()}catch(e){app.innerHTML=shell(`<section class="notFound"><div><h1>Error</h1><p>${esc(e.message)}</p></div></section>`);bind();return}}if(p==='/')app.innerHTML=home();else if(p==='/paid')app.innerHTML=listPage('paid');else if(p==='/apps')app.innerHTML=listPage('apps');else if(p==='/games')app.innerHTML=listPage('games');else if(p==='/updates/apps')app.innerHTML=listPage('updates/apps');else if(p==='/updates/games')app.innerHTML=listPage('updates/games');else if(p==='/search')app.innerHTML=searchPage();else if(p==='/cart')app.innerHTML=cart('global');else if(p==='/account')app.innerHTML=account();else if(p==='/payments')app.innerHTML=payments();else if(p==='/subscriptions'){if(state.user?.email)await loadPurch('global').catch(()=>{});app.innerHTML=subs()}else if(p==='/support')app.innerHTML=supportPage()else if(p==='/purchases')app.innerHTML=await purchases('global');else if(p.startsWith('/ipa/'))app.innerHTML=await globalDetail(decodeURIComponent(p.split('/').pop()));else app.innerHTML=notFound();bind()}
function bind(){document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',e=>{e.preventDefault();nav(el.getAttribute('data-nav'))}));const m=$('#menu'),d=$('#drawer');if(m&&d)m.addEventListener('click',()=>d.classList.toggle('open'));const live=$('#liveSearch');if(live)live.addEventListener('input',e=>{state.query=e.target.value;render()});const login=$('#login');if(login)login.addEventListener('click',()=>{const email=$('#email')?.value.trim(),name=$('#name')?.value.trim()||'Customer';if(!email||!email.includes('@'))return alert('Enter a valid email.');saveUser({email,name,createdAt:new Date().toISOString()});render()});const logout=$('#logout');if(logout)logout.addEventListener('click',()=>{saveUser(null);render()});document.querySelectorAll('[data-add-global]').forEach(b=>b.addEventListener('click',()=>{const id=b.getAttribute('data-add-global');if(!state.globalCart.includes(id))state.globalCart.push(id);saveCarts();render()}));document.querySelectorAll('[data-add-el]').forEach(b=>b.addEventListener('click',()=>{const id=b.getAttribute('data-add-el');if(!state.elCart.includes(id))state.elCart.push(id);saveCarts();render()}));document.querySelectorAll('[data-checkout]').forEach(b=>b.addEventListener('click',async()=>{try{if(!state.user?.email){alert('Sign in first.');nav('/account');return}const scope=b.getAttribute('data-checkout'),c=scope==='elChapo'?state.elCart:state.globalCart;if(!c.length)return alert('Your cart is empty.');b.disabled=true;b.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Redirecting...';const data=await api('/api/stripe/checkout',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({scope,postIds:c,customerEmail:state.user.email})});location.href=data.url}catch(e){alert(e.message);render()}}));document.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',async()=>{try{if(!state.user?.email){alert('Sign in first.');nav('/account');return}const plan=b.getAttribute('data-sub');b.disabled=true;b.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Redirecting...';const data=await api('/api/stripe/checkout',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({scope:'global',plan,customerEmail:state.user.email})});location.href=data.url}catch(e){alert(e.message);render()}}));document.querySelectorAll('[data-support]').forEach(b=>b.addEventListener('click',async()=>{try{const amount=Number(b.getAttribute('data-support'));b.disabled=true;b.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Redirecting...';const data=await api('/api/stripe/support',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({amount,currency:'usd',customerEmail:state.user?.email||''})});location.href=data.url}catch(e){alert(e.message);render()}}));document.querySelectorAll('[data-portal]').forEach(b=>b.addEventListener('click',async()=>{try{if(!state.user?.email){alert('Sign in first.');nav('/account');return}b.disabled=true;b.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Opening...';const data=await api('/api/stripe/portal',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({customerEmail:state.user.email,returnPath:'/payments'})});location.href=data.url}catch(e){alert(e.message);render()}}))}render();
</script>
